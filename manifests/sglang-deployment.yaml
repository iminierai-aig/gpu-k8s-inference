apiVersion: apps/v1
kind: Deployment
metadata:
  name: sglang-server
  namespace: ai-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sglang
  template:
    metadata:
      labels:
        app: sglang
    spec:
      containers:
      - name: sglang
        image: lmsysorg/sglang:latest
        args:
          - "python3"
          - "-m"
          - "sglang.launch_server"
          - "--model-path"
          - "TinyLlama/TinyLlama-1.1B-Chat-v1.0"
          - "--port"
          - "8001"
          - "--disable-cuda-graph"
        ports:
        - containerPort: 8001
        resources:
          limits:
            nvidia.com/gpu: 1
---
apiVersion: v1
kind: Service
metadata:
  name: sglang-service
  namespace: ai-lab
spec:
  selector:
    app: sglang
  ports:
  - port: 8001
    targetPort: 8001
  type: ClusterIP
